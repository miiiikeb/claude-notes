<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/notes.css?v=00000000">
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <div class="header-brand">
        <svg width="28" height="28" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="24" cy="24" r="24" fill="var(--accent)"/>
          <!-- Pencil icon -->
          <rect x="20" y="10" width="8" height="22" rx="2" fill="white" opacity="0.9" transform="rotate(0 24 24)"/>
          <polygon points="20,32 28,32 24,40" fill="white" opacity="0.9"/>
          <rect x="20" y="10" width="8" height="4" rx="2" fill="white" opacity="0.5"/>
        </svg>
        <span class="brand-name">Notes</span>
      </div>
      <nav class="app-nav">
        <a href="#home" class="nav-link" data-page="home">Notes</a>
        <a href="#tasks" class="nav-link" data-page="tasks">Tasks</a>
        <a href="#admin" class="nav-link admin-only" data-page="admin" style="display:none">Admin</a>
      </nav>
      <form action="/logout" method="POST" class="logout-form">
        <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
      </form>
    </div>
  </header>

  <main class="app-main">

    <!-- HOME PAGE -->
    <section id="page-home" class="page" style="display:none">
      <div class="page-header">
        <h2>Notes</h2>
        <a href="#noteEditor" class="btn btn-primary btn-sm" id="btn-new-note">+ New Note</a>
      </div>

      <div class="home-search-bar">
        <input type="search" id="home-search" placeholder="Search notes…" autocomplete="off" spellcheck="false">
      </div>

      <div class="filter-tabs" id="home-filter-tabs">
        <button class="filter-tab active" data-filter="">All</button>
        <button class="filter-tab" data-filter="meeting">Meeting</button>
        <button class="filter-tab" data-filter="daily">Daily</button>
        <button class="filter-tab" data-filter="general">General</button>
      </div>

      <div class="home-tag-filters" id="home-tag-filters"></div>

      <div class="notes-list" id="notes-list"></div>

      <div class="empty-state" id="notes-empty" style="display:none">
        <div class="empty-state-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="6" width="28" height="36" rx="3" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
            <rect x="14" y="14" width="16" height="2" rx="1" fill="var(--accent)"/>
            <rect x="14" y="20" width="16" height="2" rx="1" fill="var(--accent)"/>
            <rect x="14" y="26" width="10" height="2" rx="1" fill="var(--accent)"/>
          </svg>
        </div>
        <h3>No notes yet</h3>
        <p>Create your first note to get started.</p>
        <a href="#noteEditor" class="btn btn-primary btn-sm">+ New Note</a>
      </div>
    </section>

    <!-- NOTE EDITOR PAGE -->
    <section id="page-noteEditor" class="page" style="display:none">
      <div class="page-header">
        <button class="btn btn-ghost btn-sm" id="btn-editor-back">← Notes</button>
        <div style="display:flex;gap:0.5rem;align-items:center">
          <button class="btn btn-ghost btn-sm" id="btn-preview-toggle">Preview</button>
          <button class="btn btn-danger btn-sm" id="btn-editor-delete" style="display:none">Delete</button>
          <button class="btn btn-primary btn-sm" id="btn-editor-save">Save</button>
        </div>
      </div>

      <div class="editor-meta">
        <select id="editor-type">
          <option value="meeting">Meeting</option>
          <option value="daily">Daily</option>
          <option value="general">General</option>
        </select>
        <input type="date" id="editor-date">
        <input type="text" id="editor-title" placeholder="Note title…" autocomplete="off">
      </div>

      <div class="editor-tags-section" id="editor-tags-section" style="display:none">
        <div class="detail-tags-row">
          <div id="editor-tags-list" class="detail-tags-chips"></div>
          <input type="text" id="editor-tag-input" placeholder="Add tag…" autocomplete="off" list="editor-tags-suggestions">
          <datalist id="editor-tags-suggestions"></datalist>
        </div>
      </div>

      <div class="editor-body" id="editor-body">
        <div class="editor-write-pane">
          <textarea id="editor-textarea" placeholder="Write in markdown…" spellcheck="true"></textarea>
        </div>
        <div class="editor-preview-pane" id="editor-preview-pane">
          <div class="editor-preview-content markdown-body" id="editor-preview"></div>
        </div>
      </div>
    </section>

    <!-- NOTE DETAIL PAGE -->
    <section id="page-noteDetail" class="page" style="display:none">
      <div class="page-header">
        <button class="btn btn-ghost btn-sm" id="btn-detail-back">← Notes</button>
        <button class="btn btn-ghost btn-sm" id="btn-detail-edit">Edit</button>
      </div>

      <div class="note-detail-header">
        <div class="note-detail-meta">
          <span class="type-badge" id="detail-type-badge"></span>
          <span class="note-detail-date" id="detail-date"></span>
        </div>
        <h1 class="note-detail-title" id="detail-title"></h1>
      </div>

      <div class="markdown-body note-detail-body" id="detail-body"></div>

      <div class="note-detail-section" id="detail-tasks-section">
        <div class="note-detail-section-header">
          <h3>Tasks</h3>
          <button class="btn btn-ghost btn-sm" id="btn-add-task">+ Add task</button>
        </div>
        <div class="detail-add-task-form" id="detail-task-add-form" style="display:none">
          <input type="text" id="detail-new-task-title" placeholder="Task title…" autocomplete="off">
          <button class="btn btn-primary btn-sm" id="detail-task-add-save">Add</button>
          <button class="btn btn-ghost btn-sm" id="detail-task-add-cancel">Cancel</button>
        </div>
        <div id="detail-tasks-list"></div>
      </div>

      <div class="note-detail-section" id="detail-tags-section">
        <div class="note-detail-section-header">
          <h3>Tags</h3>
        </div>
        <div class="detail-tags-row">
          <div id="detail-tags-list" class="detail-tags-chips"></div>
          <input type="text" id="detail-tag-input" placeholder="Add tag…" autocomplete="off" list="detail-tags-suggestions">
          <datalist id="detail-tags-suggestions"></datalist>
        </div>
      </div>
    </section>

    <!-- TASKS PAGE -->
    <section id="page-tasks" class="page" style="display:none">
      <div class="page-header">
        <h2>Tasks</h2>
        <button class="btn btn-primary btn-sm" id="btn-new-task-page">+ New Task</button>
      </div>

      <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">All</button>
        <button class="filter-tab" data-filter="active">Active</button>
        <button class="filter-tab" data-filter="done">Done</button>
        <button class="filter-tab" data-filter="cancelled">Cancelled</button>
      </div>

      <div class="task-create-form" id="tasks-create-form" style="display:none">
        <input type="text" id="new-task-title" placeholder="Task title…" autocomplete="off">
        <select id="new-task-status">
          <option value="backlog">Backlog</option>
          <option value="todo">Todo</option>
          <option value="in_progress">In Progress</option>
          <option value="blocked">Blocked</option>
        </select>
        <input type="date" id="new-task-due">
        <button class="btn btn-primary btn-sm" id="tasks-create-save">Add</button>
        <button class="btn btn-ghost btn-sm" id="tasks-create-cancel">Cancel</button>
      </div>

      <div class="tasks-list" id="tasks-list"></div>

      <div class="empty-state" id="tasks-empty" style="display:none">
        <div class="empty-state-icon">
          <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="8" y="8" width="32" height="32" rx="4" fill="var(--accent-light)" stroke="var(--accent)" stroke-width="2"/>
            <path d="M16 17h16M16 24h16M16 31h10" stroke="var(--accent)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>No tasks</h3>
        <p>Create a task or add one from a note.</p>
      </div>
    </section>

    <!-- ADMIN PAGE — provided by std-platform (admin.js + routes/admin.js + routes/todo.js) -->
    <section id="page-admin" class="page" style="display:none">
      <div class="page-header">
        <h2>Admin</h2>
      </div>

      <div class="settings-section admin-section" style="margin-bottom:1.5rem">
        <div class="admin-section-header">
          <div>
            <h3>Users</h3>
            <p class="settings-section-desc">Manage who can access this app.</p>
          </div>
          <button class="section-minimize-btn" title="Minimise">−</button>
        </div>
        <div class="settings-section-body">
          <form id="adminAddUserForm" class="units-add-row" style="margin-bottom:1rem" onsubmit="return false">
            <input type="email" id="adminNewEmail" placeholder="email@example.com">
            <select id="adminNewRole">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
            <button type="submit" class="btn btn-primary btn-sm">Add User</button>
          </form>
          <div class="units-list" id="adminUsersList"></div>
        </div>
      </div>

      <div class="settings-section admin-section">
        <div class="admin-section-header">
          <div>
            <h3>Issues</h3>
            <p class="settings-section-desc">Task list synced with GitHub Issues.</p>
          </div>
          <button class="section-minimize-btn" title="Minimise">−</button>
        </div>
        <div class="settings-section-body">
          <div style="margin-bottom:1rem">
            <button class="btn btn-primary btn-sm" id="addTodoBtn">+ Add Item</button>
          </div>
          <div class="todo-filters" id="todoFilters"></div>
          <div class="todo-add-form" id="todoAddForm" style="display:none">
            <div class="form-group">
              <label>Title</label>
              <input type="text" id="todoNewTitle" maxlength="200" placeholder="Issue title">
            </div>
            <div class="form-group">
              <label>Notes</label>
              <textarea id="todoNewNotes" rows="3" placeholder="Optional notes…"></textarea>
            </div>
            <div class="todo-form-row">
              <div class="form-group" style="flex:0 0 auto">
                <label>Priority</label>
                <select id="todoNewPriority">
                  <option value="H">H — High</option>
                  <option value="M" selected>M — Medium</option>
                  <option value="L">L — Low</option>
                </select>
              </div>
              <div class="form-group" style="flex:0 0 auto">
                <label>Status</label>
                <select id="todoNewWorkflow">
                  <option value="backlog" selected>Backlog</option>
                  <option value="on_hold">On Hold</option>
                  <option value="blocked">Blocked</option>
                  <option value="approved">Approved</option>
                  <option value="deployed">Deployed</option>
                  <option value="done">Done</option>
                  <option value="wont_do">Won't Do</option>
                </select>
              </div>
            </div>
            <div class="todo-form-actions">
              <button class="btn btn-primary btn-sm" id="todoSaveNewBtn">Save</button>
              <button class="btn btn-ghost btn-sm" id="todoCancelNewBtn">Cancel</button>
            </div>
          </div>
          <div id="todoList"></div>
        </div>
      </div>
    </section>

  </main>

  <div id="confirmModal" class="modal" style="display:none">
    <div class="modal-overlay"></div>
    <div class="modal-content modal-content--xs">
      <div class="modal-header">
        <h3 id="confirmTitle">Confirm</h3>
      </div>
      <p class="confirm-message" id="confirmMessage"></p>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="confirmCancel">Cancel</button>
        <button class="btn btn-danger" id="confirmOk">Confirm</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Platform scripts (from std-platform/public — never edit these) -->
  <script src="/app.js"></script>
  <script src="/admin.js"></script>
  <!-- Project scripts -->
  <script src="/dompurify.min.js?v=00000000"></script>
  <script src="/marked.min.js?v=00000000"></script>
  <script src="/home.js?v=00000000"></script>
  <script src="/noteEditor.js?v=00000000"></script>
  <script src="/noteDetail.js?v=00000000"></script>
  <script src="/tasks.js?v=00000000"></script>

</body>
</html>
